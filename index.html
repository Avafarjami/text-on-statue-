<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Memorial - Ghost Cube</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #ar-button {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); padding: 12px 24px;
            background: #007bff; color: white; border: none;
            border-radius: 8px; font-size: 16px; z-index: 999;
        }
    </style>
</head>
<body>
    <button id="ar-button">شروع واقعیت افزوده</button>

    <script type="module">
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let scene, camera, renderer, referenceCube;

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // فعال سازی قابلیت XR
            document.body.appendChild(renderer.domElement);

            // اضافه کردن دکمه مخصوص گوگل برای شروع AR
            document.body.appendChild(ARButton.createButton(renderer));

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            const loader = new THREE.GLTFLoader();
            loader.load('cube_map.glb', (gltf) => {
                referenceCube = gltf.scene;
                referenceCube.traverse((child) => {
                    if (child.isMesh) {
                        child.material.colorWrite = false; // نامرئی کردن
                        child.material.depthWrite = true;
                    }
                });
                // مدل را کمی جلوتر از دوربین قرار می‌دهیم تا دیده شود
                referenceCube.position.set(0, 0, -0.5); 
                scene.add(referenceCube);
            });

            renderer.setAnimationLoop(render);
        }

        function render() {
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
