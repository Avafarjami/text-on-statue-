<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Memorial Statue</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #111; color: white; z-index: 1000;
        }
        button {
            padding: 20px 40px; font-size: 20px; background: #007bff;
            color: white; border: none; border-radius: 12px; cursor: pointer;
        }
        #status {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; z-index: 10; font-size: 14px; background: rgba(0,0,0,0.5); padding: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h2>پروژه یادمان</h2>
        <button id="start-btn">ورود به دوربین AR</button>
    </div>
    <div id="status">در حال جستجوی سطح... گوشی را حرکت دهید</div>

    <script>
        let scene, camera, renderer, referenceCube, reticle, hitTestSource;
        let isPlaced = false;

        const startBtn = document.getElementById('start-btn');
        startBtn.onclick = async () => {
            if (navigator.xr) {
                try {
                    // درخواست مستقیم سشن بدون کتابخانه‌های واسطه
                    const session = await navigator.xr.requestSession('immersive-ar', {
                        requiredFeatures: ['hit-test', 'local-floor']
                    });
                    init(session);
                } catch (e) {
                    alert("خطای امنیتی یا فنی: " + e.message);
                }
            } else {
                alert("WebXR یافت نشد. حتماً از WebXR Viewer استفاده کنید.");
            }
        };

        function init(session) {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('status').style.display = 'block';

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            renderer.xr.setSession(session);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);

            scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1));

            // لود مدل
            const loader = new THREE.GLTFLoader();
            loader.load('cube_map.glb', (gltf) => {
                referenceCube = gltf.scene;
                referenceCube.traverse(node => {
                    if (node.isMesh) {
                        node.material.colorWrite = false;
                        node.material.depthWrite = true;
                    }
                });
                referenceCube.visible = false;
                scene.add(referenceCube);
            });

            // دایره سفید
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.1, 0.12, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial()
            );
            reticle.visible = false;
            scene.add(reticle);

            session.addEventListener('select', onSelect);
            renderer.setAnimationLoop(render);
        }

        function onSelect() {
            if (!isPlaced && reticle.visible) {
                referenceCube.position.setFromMatrixPosition(reticle.matrix);
                referenceCube.quaternion.setFromRotationMatrix(reticle.matrix);
                referenceCube.visible = true;
                isPlaced = true;
                reticle.visible = false;
                document.getElementById('status').innerText = "قفل شد. برای متن، مرکز صفحه را روی وجه بگیرید.";
            } else if (isPlaced) {
                const raycaster = new THREE.Raycaster();
                const tempMatrix = new THREE.Matrix4();
                tempMatrix.identity().extractRotation(camera.matrixWorld);
                raycaster.ray.origin.setFromMatrixPosition(camera.matrixWorld);
                raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

                const intersects = raycaster.intersectObject(referenceCube, true);
                if (intersects.length > 0) {
                    const msg = prompt("متن یادگاری:");
                    if (msg) addLabel(msg, intersects[0].point, intersects[0].face.normal);
                }
            }
        }

        function addLabel(text, pos, normal) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 1024; canvas.height = 256;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 80px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 512, 128);

            const texture = new THREE.CanvasTexture(canvas);
            const label = new THREE.Mesh(
                new THREE.PlaneGeometry(0.5, 0.125),
                new THREE.MeshBasicMaterial({ map: texture, transparent: true, side: THREE.DoubleSide })
            );

            label.position.copy(pos).add(normal.clone().multiplyScalar(0.02));
            label.lookAt(new THREE.Vector3().addVectors(pos, normal));
            scene.add(label);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();
                if (!hitTestSource) {
                    session.requestReferenceSpace('viewer').then(space => {
                        session.requestHitTestSource({ space }).then(src => { hitTestSource = src; });
                    });
                }
                if (hitTestSource && !isPlaced) {
                    const results = frame.getHitTestResults(hitTestSource);
                    if (results.length > 0) {
                        const hit = results[0];
                        reticle.visible = true;
                        reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
