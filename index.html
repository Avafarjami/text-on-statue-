<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Memorial - Final Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.7); color: white; z-index: 1000;
        }
        button {
            padding: 20px 40px; font-size: 18px; cursor: pointer;
            background: #2196F3; color: white; border: none; border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h2>پروژه واقعیت افزوده</h2>
        <p>برای فعال‌سازی دوربین، دکمه زیر را لمس کنید</p>
        <button id="start-ar">شروع دوربین (AR)</button>
    </div>

    <script type="module">
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let scene, camera, renderer, referenceCube;

        const startButton = document.getElementById('start-ar');
        startButton.addEventListener('click', initAR);

        async function initAR() {
            // حذف اورلی بعد از کلیک
            document.getElementById('overlay').style.display = 'none';

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // ایجاد دکمه استاندارد و کلیک خودکار روی آن برای فریب دادن سیستم امنیتی iOS
            const arBtn = ARButton.createButton(renderer, { requiredFeatures: ['hit-test', 'local-floor'] });
            document.body.appendChild(arBtn);
            arBtn.click(); // شبیه‌سازی کلیک برای باز شدن آنی دوربین

            const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
            scene.add(light);

            const loader = new THREE.GLTFLoader();
            loader.load('cube_map.glb', (gltf) => {
                referenceCube = gltf.scene;
                referenceCube.traverse(node => {
                    if (node.isMesh) {
                        node.material.colorWrite = false;
                        node.material.depthWrite = true;
                    }
                });
                referenceCube.position.set(0, 0, -2); // ۲ متر جلوتر از شما
                scene.add(referenceCube);
            });

            renderer.setAnimationLoop((timestamp, frame) => {
                renderer.render(scene, camera);
            });
        }
    </script>
</body>
</html>
