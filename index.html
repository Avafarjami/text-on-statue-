<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced WebXR - Precise Placement</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <div id="status" style="position: absolute; top: 10px; width: 100%; text-align: center; color: white; background: rgba(0,0,0,0.5); z-index: 10;">
        در حال اسکن محیط... گوشی را به آرامی حرکت دهید
    </div>
    <script type="module">
        import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/ARButton.js';

        let scene, camera, renderer, referenceCube, hitTestSource;
        let isAnchored = false;

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);

            // درخواست قابلیت hit-test و anchors برای پایداری در ابعاد بزرگ
            document.body.appendChild(ARButton.createButton(renderer, { 
                requiredFeatures: ['hit-test', 'anchors'] 
            }));

            const loader = new THREE.GLTFLoader();
            loader.load('cube_map.glb', (gltf) => {
                referenceCube = gltf.scene;
                referenceCube.traverse((node) => {
                    if (node.isMesh) {
                        node.material.colorWrite = false;
                        node.material.depthWrite = true;
                    }
                });
                referenceCube.visible = false;
                scene.add(referenceCube);
            });

            renderer.setAnimationLoop(render);
        }

        function render(timestamp, frame) {
            if (frame) {
                const session = renderer.xr.getSession();
                const referenceSpace = renderer.xr.getReferenceSpace();

                // راه اندازی سیستم تشخیص سطح در اولین فریم
                if (!hitTestSource) {
                    session.requestReferenceSpace('viewer').then((space) => {
                        session.requestHitTestSource({ space }).then((source) => {
                            hitTestSource = source;
                        });
                    });
                }

                if (hitTestSource && !isAnchored) {
                    const hitTestResults = frame.getHitTestResults(hitTestSource);
                    if (hitTestResults.length > 0) {
                        const hit = hitTestResults[0];
                        const pose = hit.getPose(referenceSpace);

                        // به محض پیدا کردن اولین سطح پایدار، مدل را آنجا فیکس کن
                        referenceCube.position.set(pose.transform.position.x, pose.transform.position.y, pose.transform.position.z);
                        referenceCube.quaternion.set(pose.transform.orientation.x, pose.transform.orientation.y, pose.transform.orientation.z, pose.transform.orientation.w);
                        
                        referenceCube.visible = true;
                        isAnchored = true; // مدل قفل شد
                        document.getElementById('status').innerText = "شیء شناسایی و در فضا قفل شد.";
                    }
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
