<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Memorial - Ghost Cube</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">روی وجه‌های مکعب (نامرئی) کلیک کنید</div>
    <script type="module">
        let scene, camera, renderer, raycaster, mouse;
        let referenceCube;

        init();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            const loader = new THREE.GLTFLoader();
            loader.load('cube_map.glb', (gltf) => {
                referenceCube = gltf.scene;

                referenceCube.traverse((child) => {
                    if (child.isMesh) {
                        // جادوی اصلی: مکعب وجود دارد اما رندر نمی‌شود
                        child.material.colorWrite = false; 
                        child.material.depthWrite = true; // این باعث می‌شود متن‌های پشت مکعب دیده نشوند (Occlusion)
                    }
                });

                scene.add(referenceCube);
                console.log("مدل نامرئی لود شد.");
            });

            window.addEventListener('click', onMouseClick, false);
            animate();
        }

        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                
                // در اینجا نام Vertex Group که در بلندر ساختی را چک می‌کنیم
                // توجه: در Three.js دسترسی به نام گروه از طریق جئومتری است
                console.log("شما به یک وجه از مکعب نامرئی ضربه زدید!");
                
                // در مرحله بعد: اضافه کردن متن به مختصات intersects[0].point
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
